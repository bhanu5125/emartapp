config:
  mongodbname: epoc
  mongo_uri: mongodb://emongo:27017/epoc
  mysqldbname: books
  # Override at install time, e.g.:
  #   helm upgrade ... -f kkartchart/values.secrets.yaml
  #   helm upgrade ... --set kkartcharts-database.config.mysqlPassword=... (from parent chart)
  mysqlPassword: "changeme"
image:
  mongo: 
    repository: mongo
    tag: 4
  mysql: 
    repository: mysql
    tag: 5.7.25
service:
  mongo:
    port: 27017
    type: ClusterIP
  mysql:
    port: 3306
    type: ClusterIP